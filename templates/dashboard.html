<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-4">
    <h2 class="text-center mb-4">📊 Analytics Dashboard</h2>

    <div class="row">

        <!-- Bar Chart -->
        <div class="col-md-6">
            <div class="card bg-secondary p-3">
                <h5 class="text-center">Top Products</h5>
                <img src="/static/bar.png" class="img-fluid">
            </div>
        </div>

        <!-- Pie Chart -->
        <div class="col-md-6">
            <div class="card bg-secondary p-3">
                <h5 class="text-center">Product Distribution</h5>
                <img src="/static/pie.png" class="img-fluid">
            </div>
        </div>

    </div>

    <div class="row mt-4">

        <!-- Line Chart -->
        <div class="col-md-12">
            <div class="card bg-secondary p-3">
                <h5 class="text-center">Sales Trend</h5>
                <img src="/static/line.png" class="img-fluid">
            </div>
        </div>

    </div>

    <a href="/" class="btn btn-light mt-4">Back</a>
</div>

</body>
</html>
