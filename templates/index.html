<!DOCTYPE html>
<html>
<head>
    <title>Retail Analytics System</title>

    <!-- Bootstrap CSS (no JS used) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            font-family: Arial, sans-serif;
        }

        .container-box {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: bold;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn-custom {
            width: 220px;
            margin: 10px;
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container-box">
    <div class="card-box">

        <h1>📊 Smart Retail Analytics</h1>
        <p>Data Mining & Data Warehousing Project</p>

        <div>
            <a href="/dashboard" class="btn btn-primary btn-custom">📊 Dashboard</a><br>
            <a href="/recommend" class="btn btn-success btn-custom">🛒 Recommendations</a><br>
            <a href="/cluster" class="btn btn-warning btn-custom">👥 Clustering</a>
        </div>

    </div>
</div>

</body>
</html>
